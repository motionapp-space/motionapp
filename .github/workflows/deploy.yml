name: Deploy to Supabase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-supabase:
    runs-on: ubuntu-latest
    # AGGIUNTO: Necessario per leggere i secrets dallo screenshot
    environment: Production 
    
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # Consiglio: definire la password qui la rende disponibile a tutti gli step
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase Project
        # Utilizziamo le variabili d'ambiente per pulizia
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --password $SUPABASE_DB_PASSWORD

      - name: Apply Migrations
        # Con il link attivo, db push non ha bisogno di flag extra
        run: supabase db push --password $SUPABASE_DB_PASSWORD

      - name: Deploy Edge Functions
        # Aggiungiamo --all se vuoi pushare tutte le funzioni nella cartella
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
